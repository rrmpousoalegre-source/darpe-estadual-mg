<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Corrigir Nomes — DARPE MG</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Verdana, sans-serif; background: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.card { background: white; border-radius: 10px; padding: 32px; max-width: 620px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
.logo { width: 48px; height: 48px; background: #033D60; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 11px; margin: 0 auto 16px; line-height: 1.3; text-align: center; }
h2 { text-align: center; color: #033D60; font-size: 15px; margin-bottom: 4px; }
p.sub { text-align: center; font-size: 11px; color: #888; margin-bottom: 24px; }
.info { background: #EBF4FA; border: 1px solid #b8d4e8; border-radius: 6px; padding: 12px; font-size: 11px; color: #033D60; margin-bottom: 20px; line-height: 1.7; }
.info b { color: #022a47; }
button { width: 100%; padding: 12px; background: #033D60; color: white; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-family: Verdana, sans-serif; }
button:hover { background: #022a47; }
button:disabled { background: #aaa; cursor: not-allowed; }
#log { margin-top: 20px; background: #0D1B2A; border-radius: 6px; padding: 14px; font-family: monospace; font-size: 11px; max-height: 320px; overflow-y: auto; display: none; }
#log::-webkit-scrollbar { width: 4px; }
#log::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
.ll { padding: 2px 0; }
.ok   { color: #69db7c; }
.skip { color: #aaa; }
.err  { color: #ff6b6b; }
.head { color: #ffd43b; font-weight: bold; }
.info-log { color: #74c0fc; }
#done { display: none; text-align: center; margin-top: 14px; font-size: 12px; font-weight: bold; padding: 10px; border-radius: 6px; }
#done.ok  { background: #E8F5E9; color: #1b7a3e; }
#done.err { background: #FDECEA; color: #c62828; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">CCB<br>MG</div>
  <h2>Padronizar Nomes — Remover "Ir"</h2>
  <p class="sub">Remove o prefixo "Ir" de todos os nomes no banco de dados</p>

  <div class="info">
    <b>O que será alterado:</b><br>
    ✓ Nomes dos anciães CAE nas <b>regiões</b><br>
    ✓ Coordenadores locais e estaduais em todas as <b>cidades</b><br><br>
    <b>Exemplo:</b> "Ir Paulo Lopes" → "Paulo Lopes"<br>
    Nomes sem prefixo "Ir" não serão alterados.
  </div>

  <button id="btn" onclick="corrigir()">▶ Executar Correção</button>
  <div id="log"></div>
  <div id="done"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDvLEtfAFKakg9Lfi7qdQl3FxmJW4QvqfI",
  authDomain: "darpe-estadual-mg.firebaseapp.com",
  projectId: "darpe-estadual-mg",
  storageBucket: "darpe-estadual-mg.firebasestorage.app",
  messagingSenderId: "768789192963",
  appId: "1:768789192963:web:bc758d4ea46fb3ff3bc936"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Remove "Ir " do início do nome (case-insensitive, com ou sem ponto)
function limpar(nome) {
  if (!nome) return nome;
  return nome.replace(/^Ir\.?\s+/i, '').trim();
}

const logEl = document.getElementById('log');
function log(msg, cls = 'info-log') {
  logEl.style.display = 'block';
  const d = document.createElement('div');
  d.className = 'll ' + cls;
  d.textContent = msg;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

async function corrigir() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = '⏳ Processando...';

  let alterados = 0, ignorados = 0, erros = 0;

  log('══════ PADRONIZAÇÃO DE NOMES ══════', 'head');

  // ── REGIÕES (campo: cae) ──────────────────────
  log('', 'info-log');
  log('── Regiões (campo CAE)...', 'head');
  try {
    const snap = await db.collection('regioes').get();
    for (const doc of snap.docs) {
      const data = doc.data();
      const caeLimpo = limpar(data.cae);
      if (caeLimpo !== data.cae) {
        try {
          await db.collection('regioes').doc(doc.id).update({ cae: caeLimpo });
          log(`  ✓ Região ${data.numero}: "${data.cae}" → "${caeLimpo}"`, 'ok');
          alterados++;
        } catch(e) {
          log(`  ✗ Região ${data.numero}: ${e.message}`, 'err');
          erros++;
        }
      } else {
        log(`  — Região ${data.numero}: "${data.cae}" (sem alteração)`, 'skip');
        ignorados++;
      }
    }
  } catch(e) {
    log(`  ✗ Erro ao ler regiões: ${e.message}`, 'err');
    erros++;
  }

  // ── CIDADES (campos: coordenadorLocal, coordenadorEstadual) ─────
  log('', 'info-log');
  log('── Cidades (coordenadores)...', 'head');
  try {
    const snap = await db.collection('cidades').get();
    for (const doc of snap.docs) {
      const data = doc.data();
      const localLimpo    = limpar(data.coordenadorLocal);
      const estadualLimpo = limpar(data.coordenadorEstadual);

      const mudouLocal    = localLimpo    !== data.coordenadorLocal;
      const mudouEstadual = estadualLimpo !== data.coordenadorEstadual;

      if (mudouLocal || mudouEstadual) {
        const update = {};
        if (mudouLocal)    update.coordenadorLocal    = localLimpo;
        if (mudouEstadual) update.coordenadorEstadual = estadualLimpo;
        try {
          await db.collection('cidades').doc(doc.id).update(update);
          const antes = [
            mudouLocal    ? `Local: "${data.coordenadorLocal}"` : null,
            mudouEstadual ? `Estadual: "${data.coordenadorEstadual}"` : null,
          ].filter(Boolean).join(' | ');
          log(`  ✓ ${data.nome}: ${antes}`, 'ok');
          alterados++;
        } catch(e) {
          log(`  ✗ ${data.nome}: ${e.message}`, 'err');
          erros++;
        }
      } else {
        ignorados++;
      }
    }
  } catch(e) {
    log(`  ✗ Erro ao ler cidades: ${e.message}`, 'err');
    erros++;
  }

  log('', 'info-log');
  const done = document.getElementById('done');
  if (erros === 0) {
    log(`══════ CONCLUÍDO: ${alterados} alterados, ${ignorados} sem mudança ══════`, 'head');
    done.textContent = `✓ Pronto! ${alterados} registros atualizados. Recarregue o mapa para ver.`;
    done.className = 'ok';
    btn.textContent = '✓ Concluído';
  } else {
    log(`══════ CONCLUÍDO COM ${erros} ERRO(S) ══════`, 'err');
    done.textContent = `⚠ ${alterados} alterados, ${erros} erro(s). Verifique o log.`;
    done.className = 'err';
    btn.textContent = '⚠ Erros encontrados';
  }
  done.style.display = 'block';
}
</script>
</body>
</html>
